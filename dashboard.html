<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge Dashboard</title>

<!-- ═══════════════════════════════════════════════════════════════
     FORGE FRAMEWORK — PROJECT DASHBOARD
     Reusable shell. Copy to any PSP project with a new config.
     Works on file:// protocol — no server needed.
     ═══════════════════════════════════════════════════════════════ -->

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ─────────────────────────────────────────────
   CUSTOM PROPERTIES — Forge Theme
   ───────────────────────────────────────────── */
:root {
  --bg-deep:       #0f0d0b;
  --bg-surface:    #1c1814;
  --bg-raised:     #261f18;
  --bg-hover:      #332a20;
  --bg-inset:      #120f0c;

  --accent:        #e8761a;
  --accent-glow:   #f5a623;
  --accent-dim:    #a85a12;

  --green:         #4a7c59;
  --green-dim:     #3a6248;
  --pending:       #5c4e42;
  --pending-light: #7a6b5d;
  --in-progress:   #c4862a;

  --text:          #e8ddd0;
  --text-muted:    #9a8b7a;
  --text-dim:      #6b5e52;

  --border:        #2e261e;
  --border-light:  #3d3228;

  --font-body:     Georgia, 'Times New Roman', serif;
  --font-mono:     'Courier New', Courier, monospace;

  --radius:        6px;
  --radius-lg:     10px;
  --transition:    0.2s ease;
}

/* ─────────────────────────────────────────────
   RESET & BASE
   ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ─────────────────────────────────────────────
   LAYOUT
   ───────────────────────────────────────────── */
.dashboard {
  max-width: 1440px;
  margin: 0 auto;
  padding: 1.5rem;
}

.grid {
  display: grid;
  grid-template-columns: 22% 1fr 22%;
  gap: 1.25rem;
  margin-top: 1.25rem;
}

@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
  }
}

/* ─────────────────────────────────────────────
   HEADER
   ───────────────────────────────────────────── */
.header {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem 2rem;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-wrap: wrap;
  gap: 1rem;
}

.header h1 {
  font-family: var(--font-mono);
  font-size: 1.6rem;
  color: var(--accent);
  letter-spacing: 0.5px;
  font-weight: 700;
}

.header-meta {
  display: flex;
  gap: 1.25rem;
  flex-wrap: wrap;
  align-items: center;
}

.header-meta span {
  font-size: 0.82rem;
  color: var(--text-muted);
}

.header-meta .badge {
  background: var(--accent-dim);
  color: var(--text);
  padding: 0.15rem 0.55rem;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.header-mission {
  margin-top: 0.6rem;
  font-size: 0.88rem;
  color: var(--text-muted);
  font-style: italic;
}

.progress-container {
  margin-top: 1rem;
}

.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 0.35rem;
  font-family: var(--font-mono);
}

.progress-bar {
  height: 10px;
  background: var(--bg-inset);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.progress-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.6s ease;
}

.progress-fill.fill-green   { background: linear-gradient(90deg, var(--green-dim), var(--green)); }
.progress-fill.fill-accent  { background: linear-gradient(90deg, var(--accent-dim), var(--accent)); }

/* ─────────────────────────────────────────────
   PANEL COMMON
   ───────────────────────────────────────────── */
.panel {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  overflow: hidden;
}

.panel-title {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--border);
}

/* ─────────────────────────────────────────────
   LEFT PANEL — Doc Tiers
   ───────────────────────────────────────────── */
.tier {
  margin-bottom: 1rem;
}

.tier:last-child { margin-bottom: 0; }

.tier-header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  cursor: pointer;
  padding: 0.6rem 0.75rem;
  background: var(--bg-raised);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  transition: background var(--transition);
  user-select: none;
}

.tier-header:hover {
  background: var(--bg-hover);
}

.tier-chevron {
  font-size: 0.7rem;
  color: var(--text-dim);
  transition: transform var(--transition);
  flex-shrink: 0;
}

.tier.open .tier-chevron {
  transform: rotate(90deg);
}

.tier-label {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  flex: 1;
}

.tier-path {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-dim);
}

.tier-badge {
  font-size: 0.68rem;
  font-family: var(--font-mono);
  padding: 0.1rem 0.45rem;
  border-radius: 3px;
  font-weight: 700;
  flex-shrink: 0;
}

.tier-badge.done       { background: var(--green-dim); color: #b4d9c0; }
.tier-badge.pending    { background: var(--pending);   color: #b5a799; }
.tier-badge.inprogress { background: #3d3015;          color: var(--in-progress); }

.tier-body {
  display: none;
  padding: 0.5rem 0 0 0;
}

.tier.open .tier-body {
  display: block;
}

.tier-desc {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  padding-left: 0.75rem;
}

.tier-list {
  list-style: none;
}

.tier-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.3rem 0.75rem;
  font-size: 0.78rem;
  border-bottom: 1px solid var(--bg-inset);
}

.tier-item:last-child { border-bottom: none; }

.tier-item-icon {
  font-size: 0.72rem;
  flex-shrink: 0;
  width: 1rem;
  text-align: center;
}

.tier-item-icon.done    { color: var(--green); }
.tier-item-icon.pending { color: var(--text-dim); }

.tier-item a {
  color: var(--text);
  text-decoration: none;
  transition: color var(--transition);
}

.tier-item a:hover {
  color: var(--accent);
}

.tier-item .not-written {
  color: var(--text-dim);
  font-style: italic;
}

.tier-count {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-dim);
}

/* ─────────────────────────────────────────────
   CENTER PANEL — Milestone Journey
   ───────────────────────────────────────────── */
.ms-controls {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 0.75rem;
}

.ms-toggle-btn {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--accent);
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.3rem 0.75rem;
  cursor: pointer;
  transition: all var(--transition);
}

.ms-toggle-btn:hover {
  background: var(--bg-raised);
  border-color: var(--accent-dim);
}

.ms-timeline {
  position: relative;
  padding-left: 1.5rem;
}

.ms-timeline::before {
  content: '';
  position: absolute;
  left: 5px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--border);
}

.ms-card {
  position: relative;
  margin-bottom: 1rem;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition);
}

.ms-card:hover {
  border-color: var(--border-light);
}

.ms-card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
}

.ms-card.status-complete::before { background: var(--green); }
.ms-card.status-pending::before  { background: var(--pending); }

.ms-timeline .ms-card::after {
  content: '';
  position: absolute;
  left: -1.5rem;
  top: 1rem;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg-deep);
}

.ms-card.status-complete + .ms-timeline .ms-card::after,
.ms-timeline .ms-card.status-complete::after {
  border-color: var(--green);
  background: var(--green-dim);
}

.ms-card-header {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}

.ms-card-header:hover {
  background: var(--bg-hover);
}

.ms-card-id {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-dim);
  flex-shrink: 0;
  min-width: 2.5rem;
}

.ms-card-name {
  font-size: 0.88rem;
  font-weight: 600;
  flex: 1;
}

.ms-card-ratio {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

.ms-card-badge {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  font-weight: 700;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.ms-card-badge.done    { background: var(--green-dim); color: #b4d9c0; }
.ms-card-badge.pending { background: var(--pending);   color: #b5a799; }

.ms-card-chevron {
  font-size: 0.7rem;
  color: var(--text-dim);
  transition: transform var(--transition);
  flex-shrink: 0;
}

.ms-card.open .ms-card-chevron {
  transform: rotate(90deg);
}

.ms-card-body {
  display: none;
  padding: 0 1rem 0.75rem 1rem;
}

.ms-card.open .ms-card-body {
  display: block;
}

.wbs-list {
  list-style: none;
}

.wbs-item {
  display: flex;
  align-items: flex-start;
  gap: 0.5rem;
  padding: 0.35rem 0;
  font-size: 0.78rem;
  border-bottom: 1px solid var(--bg-inset);
}

.wbs-item:last-child { border-bottom: none; }

.wbs-icon {
  flex-shrink: 0;
  width: 1rem;
  text-align: center;
  margin-top: 0.1rem;
  font-size: 0.75rem;
}

.wbs-icon.done    { color: var(--green); }
.wbs-icon.pending { color: var(--text-dim); }

.wbs-id {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  flex-shrink: 0;
  min-width: 2.2rem;
}

.wbs-desc {
  flex: 1;
  color: var(--text-muted);
}

.wbs-item.done .wbs-desc {
  color: var(--text);
}

.ms-card-progress {
  height: 3px;
  background: var(--bg-inset);
}

.ms-card-progress-fill {
  height: 100%;
  background: var(--green);
  transition: width 0.4s ease;
}

/* ─────────────────────────────────────────────
   RIGHT PANEL — Framework Concepts
   ───────────────────────────────────────────── */
.concept-card {
  padding: 0.7rem 0.85rem;
  margin-bottom: 0.6rem;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all var(--transition);
}

.concept-card:last-child { margin-bottom: 0; }

.concept-card:hover {
  background: var(--bg-hover);
  border-color: var(--accent-dim);
}

.concept-label {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.15rem;
}

.concept-subtitle {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-style: italic;
}

/* ─────────────────────────────────────────────
   DRAWER — Reference Card Popup
   ───────────────────────────────────────────── */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 6, 4, 0.75);
  z-index: 1000;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
}

.drawer-overlay.open {
  opacity: 1;
  visibility: visible;
}

.drawer {
  position: fixed;
  top: 0;
  right: 0;
  width: min(560px, 92vw);
  height: 100vh;
  background: var(--bg-surface);
  border-left: 2px solid var(--accent-dim);
  z-index: 1001;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.drawer.open {
  transform: translateX(0);
}

.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg-raised);
}

.drawer-title {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: var(--accent);
  font-weight: 700;
}

.drawer-subtitle {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-style: italic;
  margin-top: 0.15rem;
}

.drawer-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 2rem;
  height: 2rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.drawer-close:hover {
  background: var(--bg-hover);
  color: var(--text);
  border-color: var(--accent-dim);
}

.drawer-body {
  padding: 1.5rem;
  flex: 1;
  overflow-y: auto;
}

.drawer-footer {
  padding: 0.75rem 1.5rem;
  border-top: 1px solid var(--border);
  background: var(--bg-raised);
  flex-shrink: 0;
}

.drawer-footer a {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--accent);
  text-decoration: none;
}

.drawer-footer a:hover {
  color: var(--accent-glow);
}

/* Drawer content styling for reference card HTML */
.drawer-body .rc-intro {
  font-size: 0.92rem;
  color: var(--text);
  margin-bottom: 1rem;
  line-height: 1.65;
}

.drawer-body .rc-diagram {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--accent);
  background: var(--bg-inset);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.85rem 1rem;
  overflow-x: auto;
  margin-bottom: 1.15rem;
  line-height: 1.5;
}

.drawer-body .rc-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1.15rem;
  font-size: 0.8rem;
}

.drawer-body .rc-table th {
  background: var(--bg-inset);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 0.5rem 0.65rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.drawer-body .rc-table td {
  padding: 0.45rem 0.65rem;
  border-bottom: 1px solid var(--bg-inset);
  color: var(--text-muted);
  vertical-align: top;
}

.drawer-body .rc-table td strong {
  color: var(--text);
}

.drawer-body .rc-table-compact td,
.drawer-body .rc-table-compact th {
  padding: 0.35rem 0.55rem;
  font-size: 0.78rem;
}

.drawer-body h4 {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 1.15rem 0 0.5rem 0;
}

.drawer-body ul, .drawer-body ol {
  padding-left: 1.25rem;
  margin-bottom: 0.85rem;
}

.drawer-body li {
  font-size: 0.82rem;
  color: var(--text-muted);
  margin-bottom: 0.3rem;
  line-height: 1.5;
}

.drawer-body li strong {
  color: var(--text);
}

.drawer-body p {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
  line-height: 1.6;
}

.drawer-body p strong {
  color: var(--text);
}

.drawer-body .rc-quote {
  border-left: 3px solid var(--accent-dim);
  padding: 0.65rem 1rem;
  margin-bottom: 1rem;
  background: var(--bg-inset);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 0.88rem;
  color: var(--text);
  font-style: italic;
  line-height: 1.6;
}

.drawer-body .rc-attribution {
  font-size: 0.72rem;
  color: var(--text-dim);
  font-style: normal;
}

.drawer-body .rc-callout {
  background: linear-gradient(135deg, rgba(232, 118, 26, 0.08), rgba(232, 118, 26, 0.03));
  border: 1px solid rgba(232, 118, 26, 0.2);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.6;
  margin-top: 0.5rem;
}

.drawer-body .rc-deflist {
  margin-bottom: 1rem;
}

.drawer-body .rc-deflist dt {
  font-family: var(--font-mono);
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--text);
  margin-top: 0.6rem;
}

.drawer-body .rc-deflist dd {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-left: 0;
  padding-left: 0.75rem;
  border-left: 2px solid var(--border);
  margin-top: 0.2rem;
  line-height: 1.55;
}

.drawer-body .rc-muted {
  color: var(--text-dim);
  font-size: 0.75rem;
}

.drawer-body code {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  background: var(--bg-inset);
  padding: 0.1rem 0.35rem;
  border-radius: 3px;
  color: var(--accent);
}

/* ─────────────────────────────────────────────
   FOOTER — Source Documents
   ───────────────────────────────────────────── */
.footer {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1rem 1.5rem;
  margin-top: 1.25rem;
}

.footer-title {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 0.65rem;
}

.footer-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.footer-pill {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-muted);
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 0.25rem 0.7rem;
  text-decoration: none;
  transition: all var(--transition);
  white-space: nowrap;
}

.footer-pill:hover {
  background: var(--bg-hover);
  color: var(--accent);
  border-color: var(--accent-dim);
}

/* ─────────────────────────────────────────────
   SCROLLBAR
   ───────────────────────────────────────────── */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: var(--bg-deep);
}

::-webkit-scrollbar-thumb {
  background: var(--border-light);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--pending);
}

/* ─────────────────────────────────────────────
   DOCUMENT VIEWER — Full-screen overlay
   ───────────────────────────────────────────── */
.docviewer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(8, 6, 4, 0.82);
  z-index: 2000;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.25s ease, visibility 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.docviewer-overlay.open {
  opacity: 1;
  visibility: visible;
}

.docviewer {
  width: min(900px, 94vw);
  max-height: 92vh;
  background: var(--bg-surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
  transform: scale(0.96) translateY(10px);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
}

.docviewer-overlay.open .docviewer {
  transform: scale(1) translateY(0);
}

.docviewer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg-raised);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  flex-shrink: 0;
}

.docviewer-path {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  margin-right: 1rem;
}

.docviewer-path span {
  color: var(--accent);
}

.docviewer-close {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  width: 2rem;
  height: 2rem;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  flex-shrink: 0;
}

.docviewer-close:hover {
  background: var(--bg-hover);
  color: var(--text);
  border-color: var(--accent-dim);
}

.docviewer-body {
  padding: 1.75rem 2rem;
  overflow-y: auto;
  flex: 1;
}

.docviewer-loading {
  text-align: center;
  padding: 3rem;
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 0.85rem;
}

.docviewer-error {
  text-align: center;
  padding: 2rem;
  color: #c44;
  font-family: var(--font-mono);
  font-size: 0.85rem;
}

/* Rendered markdown styling */
.docviewer-body h1 {
  font-family: var(--font-mono);
  font-size: 1.5rem;
  color: var(--accent);
  margin: 0 0 1rem 0;
  padding-bottom: 0.5rem;
  border-bottom: 2px solid var(--border);
}

.docviewer-body h2 {
  font-family: var(--font-mono);
  font-size: 1.15rem;
  color: var(--accent);
  margin: 1.75rem 0 0.65rem 0;
  padding-bottom: 0.35rem;
  border-bottom: 1px solid var(--border);
}

.docviewer-body h3 {
  font-family: var(--font-mono);
  font-size: 0.95rem;
  color: var(--accent-glow);
  margin: 1.25rem 0 0.5rem 0;
}

.docviewer-body h4 {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 1rem 0 0.4rem 0;
}

.docviewer-body p {
  font-size: 0.9rem;
  color: var(--text);
  margin-bottom: 0.85rem;
  line-height: 1.7;
}

.docviewer-body ul, .docviewer-body ol {
  padding-left: 1.5rem;
  margin-bottom: 1rem;
}

.docviewer-body li {
  font-size: 0.88rem;
  color: var(--text);
  margin-bottom: 0.35rem;
  line-height: 1.6;
}

.docviewer-body strong {
  color: var(--accent-glow);
  font-weight: 700;
}

.docviewer-body em {
  color: var(--text-muted);
}

.docviewer-body blockquote {
  border-left: 3px solid var(--accent-dim);
  padding: 0.65rem 1rem;
  margin: 0 0 1rem 0;
  background: var(--bg-inset);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-style: italic;
  color: var(--text);
}

.docviewer-body blockquote p {
  margin-bottom: 0;
}

.docviewer-body code {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  background: var(--bg-inset);
  padding: 0.1rem 0.4rem;
  border-radius: 3px;
  color: var(--accent);
}

.docviewer-body pre {
  background: var(--bg-inset);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  overflow-x: auto;
  margin-bottom: 1rem;
}

.docviewer-body pre code {
  background: none;
  padding: 0;
  font-size: 0.8rem;
  color: var(--text);
}

.docviewer-body table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 1rem;
  font-size: 0.84rem;
}

.docviewer-body th {
  background: var(--bg-inset);
  color: var(--accent);
  font-family: var(--font-mono);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 0.55rem 0.75rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
}

.docviewer-body td {
  padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--bg-inset);
  color: var(--text-muted);
  vertical-align: top;
}

.docviewer-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 1.5rem 0;
}

.docviewer-body a {
  color: var(--accent);
  text-decoration: none;
}

.docviewer-body a:hover {
  color: var(--accent-glow);
  text-decoration: underline;
}

.docviewer-body img {
  max-width: 100%;
  border-radius: var(--radius);
}
</style>
</head>

<body>

<!-- Load data files -->
<script src="reference-cards/forge-reference-cards.js"></script>
<script src="dashboard-config.js"></script>

<!-- Dashboard skeleton -->
<div class="dashboard">

  <!-- HEADER -->
  <header class="header" id="header"></header>

  <!-- GRID: Left / Center / Right -->
  <div class="grid">
    <aside class="panel" id="panel-left">
      <div class="panel-title">Documentation Tiers</div>
      <div id="doc-tiers"></div>
    </aside>

    <main class="panel" id="panel-center">
      <div class="panel-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>Milestone Journey</span>
        <button class="ms-toggle-btn" id="ms-toggle" type="button">Expand All</button>
      </div>
      <div class="ms-timeline" id="ms-timeline"></div>
    </main>

    <aside class="panel" id="panel-right">
      <div class="panel-title">Framework Concepts</div>
      <div id="concepts"></div>
    </aside>
  </div>

  <!-- FOOTER -->
  <footer class="footer" id="footer"></footer>

</div>

<!-- DRAWER (reference card popup) -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawer-title"></div>
      <div class="drawer-subtitle" id="drawer-subtitle"></div>
    </div>
    <button class="drawer-close" id="drawer-close" type="button">&times;</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
  <div class="drawer-footer" id="drawer-footer"></div>
</div>

<!-- DOCUMENT VIEWER (full-screen overlay for rendered markdown) -->
<div class="docviewer-overlay" id="docviewer-overlay">
  <div class="docviewer">
    <div class="docviewer-header">
      <div class="docviewer-path" id="docviewer-path"></div>
      <button class="docviewer-close" id="docviewer-close" type="button">&times;</button>
    </div>
    <div class="docviewer-body" id="docviewer-body"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     JAVASCRIPT ENGINE
     ═══════════════════════════════════════════ -->
<script>
(function () {
  'use strict';

  // Detect missing data files (file:// script loading failure)
  if (typeof FORGE_PSP_CONFIG === 'undefined') {
    document.getElementById('header').innerHTML =
      '<h1 style="color:#e8761a;font-family:Courier New,monospace">Data Not Loaded</h1>' +
      '<p style="color:#9a8b7a;margin-top:0.5rem">Could not load <code>dashboard-config.js</code> or <code>reference-cards/forge-reference-cards.js</code>.<br>' +
      'Check the browser console for errors. Ensure both files are in the correct paths relative to this HTML file.</p>';
    return;
  }

  var CFG = FORGE_PSP_CONFIG;
  var CARDS = typeof FORGE_REFERENCE_CARDS !== 'undefined' ? FORGE_REFERENCE_CARDS : null;

  // ── Utility ──────────────────────────────────

  function countByStatus(items, status) {
    return items.filter(function (i) { return i.status === status; }).length;
  }

  function pct(done, total) {
    return total === 0 ? 0 : Math.round((done / total) * 100);
  }

  function escHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function getCard(id) {
    if (!CARDS || !CARDS.cards) return null;
    for (var i = 0; i < CARDS.cards.length; i++) {
      if (CARDS.cards[i].id === id) return CARDS.cards[i];
    }
    return null;
  }

  // ── Header ───────────────────────────────────

  function renderHeader() {
    var p = CFG.project;
    var allWbs = [];
    CFG.milestones.forEach(function (ms) {
      ms.wbs.forEach(function (w) { allWbs.push(w); });
    });
    var done = countByStatus(allWbs, 'done');
    var total = allWbs.length;
    var percent = pct(done, total);

    document.getElementById('header').innerHTML =
      '<div class="header-top">' +
        '<h1>' + escHtml(p.name) + '</h1>' +
        '<div class="header-meta">' +
          '<span>Sponsor: <strong>' + escHtml(p.sponsor) + '</strong></span>' +
          '<span>Updated: <strong>' + escHtml(p.lastUpdated) + '</strong></span>' +
          '<span class="badge">' + escHtml(p.docType) + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="header-mission">' + escHtml(p.mission) + '</div>' +
      '<div class="progress-container">' +
        '<div class="progress-label">' +
          '<span>Overall Progress</span>' +
          '<span>' + done + ' / ' + total + ' WBS items (' + percent + '%)</span>' +
        '</div>' +
        '<div class="progress-bar">' +
          '<div class="progress-fill fill-accent" style="width:' + percent + '%"></div>' +
        '</div>' +
      '</div>';
  }

  // ── Left Panel — Doc Tiers ───────────────────

  function renderDocTiers() {
    var container = document.getElementById('doc-tiers');
    var html = '';

    CFG.docTiers.forEach(function (tier) {
      var done = countByStatus(tier.items, 'done');
      var total = tier.items.length;
      var badgeClass = tier.status === 'complete' ? 'done' : (tier.status === 'in-progress' ? 'inprogress' : 'pending');
      var badgeLabel = tier.status === 'complete' ? 'Complete' : (tier.status === 'in-progress' ? 'In Progress' : 'Pending');

      html += '<div class="tier" data-tier="' + tier.id + '">';
      html +=   '<div class="tier-header" onclick="toggleTier(this)">';
      html +=     '<span class="tier-chevron">&#9654;</span>';
      html +=     '<span class="tier-label">' + escHtml(tier.label) + '</span>';
      html +=     '<span class="tier-count">' + done + '/' + total + '</span>';
      html +=     '<span class="tier-badge ' + badgeClass + '">' + badgeLabel + '</span>';
      html +=   '</div>';
      html +=   '<div class="tier-body">';
      html +=     '<div class="tier-desc">' + escHtml(tier.description) + '</div>';
      html +=     '<ul class="tier-list">';

      tier.items.forEach(function (item) {
        var iconClass = item.status === 'done' ? 'done' : 'pending';
        var iconChar = item.status === 'done' ? '&#10003;' : '&#8212;';
        html += '<li class="tier-item">';
        html +=   '<span class="tier-item-icon ' + iconClass + '">' + iconChar + '</span>';
        if (item.file) {
          html += '<a href="' + escHtml(item.file) + '">' + escHtml(item.label) + '</a>';
        } else {
          html += '<span class="not-written">' + escHtml(item.label) + '</span>';
        }
        html += '</li>';
      });

      html +=     '</ul>';
      html +=   '</div>';
      html += '</div>';
    });

    container.innerHTML = html;
  }

  window.toggleTier = function (el) {
    el.parentElement.classList.toggle('open');
  };

  // ── Center Panel — Milestones ────────────────

  function renderMilestones() {
    var container = document.getElementById('ms-timeline');
    var html = '';

    CFG.milestones.forEach(function (ms) {
      var done = countByStatus(ms.wbs, 'done');
      var total = ms.wbs.length;
      var percent = pct(done, total);
      var statusClass = ms.status === 'complete' ? 'status-complete' : 'status-pending';
      var badgeClass = ms.status === 'complete' ? 'done' : 'pending';
      var badgeLabel = ms.status === 'complete' ? 'Complete' : 'Pending';

      html += '<div class="ms-card ' + statusClass + '" data-ms="' + ms.id + '">';
      html +=   '<div class="ms-card-header" onclick="toggleMs(this)">';
      html +=     '<span class="ms-card-id">' + escHtml(ms.label) + '</span>';
      html +=     '<span class="ms-card-name">' + escHtml(ms.name) + '</span>';
      html +=     '<span class="ms-card-ratio">' + done + '/' + total + '</span>';
      html +=     '<span class="ms-card-badge ' + badgeClass + '">' + badgeLabel + '</span>';
      html +=     '<span class="ms-card-chevron">&#9654;</span>';
      html +=   '</div>';
      html +=   '<div class="ms-card-body">';
      html +=     '<ul class="wbs-list">';

      ms.wbs.forEach(function (w) {
        var wDone = w.status === 'done';
        var iconClass = wDone ? 'done' : 'pending';
        var iconChar = wDone ? '&#10003;' : '&#8212;';
        html += '<li class="wbs-item ' + (wDone ? 'done' : '') + '">';
        html +=   '<span class="wbs-icon ' + iconClass + '">' + iconChar + '</span>';
        html +=   '<span class="wbs-id">' + escHtml(w.id) + '</span>';
        html +=   '<span class="wbs-desc">' + escHtml(w.description) + '</span>';
        html += '</li>';
      });

      html +=     '</ul>';
      html +=   '</div>';
      html +=   '<div class="ms-card-progress"><div class="ms-card-progress-fill" style="width:' + percent + '%"></div></div>';
      html += '</div>';
    });

    container.innerHTML = html;
  }

  window.toggleMs = function (el) {
    el.parentElement.classList.toggle('open');
  };

  // Expand / Collapse All
  var allExpanded = false;
  document.getElementById('ms-toggle').addEventListener('click', function () {
    allExpanded = !allExpanded;
    var cards = document.querySelectorAll('.ms-card');
    cards.forEach(function (c) {
      if (allExpanded) { c.classList.add('open'); }
      else { c.classList.remove('open'); }
    });
    this.textContent = allExpanded ? 'Collapse All' : 'Expand All';
  });

  // ── Right Panel — Concepts ───────────────────

  function renderConcepts() {
    var container = document.getElementById('concepts');
    var html = '';

    CFG.concepts.forEach(function (cardId) {
      var card = getCard(cardId);
      if (!card) return;

      html += '<div class="concept-card" data-card="' + card.id + '" onclick="openDrawer(\'' + card.id + '\')">';
      html +=   '<div class="concept-label">' + escHtml(card.label) + '</div>';
      html +=   '<div class="concept-subtitle">' + escHtml(card.subtitle) + '</div>';
      html += '</div>';
    });

    container.innerHTML = html;
  }

  // ── Drawer ───────────────────────────────────

  var drawerEl = document.getElementById('drawer');
  var overlayEl = document.getElementById('drawer-overlay');

  window.openDrawer = function (cardId) {
    var card = getCard(cardId);
    if (!card) return;

    document.getElementById('drawer-title').textContent = card.label;
    document.getElementById('drawer-subtitle').textContent = card.subtitle;
    document.getElementById('drawer-body').innerHTML = card.html;
    document.getElementById('drawer-footer').innerHTML =
      card.sourceDoc
        ? '<a href="' + escHtml(card.sourceDoc) + '">View full doc: ' + escHtml(card.sourceDoc) + '</a>'
        : '';

    drawerEl.classList.add('open');
    overlayEl.classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  function closeDrawer() {
    drawerEl.classList.remove('open');
    overlayEl.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  overlayEl.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeDrawer();
  });

  // ── Footer — Source Documents ────────────────

  function renderFooter() {
    var container = document.getElementById('footer');
    var html = '<div class="footer-title">Source Documents</div><div class="footer-pills">';

    CFG.sourceDocuments.forEach(function (doc) {
      html += '<a class="footer-pill" href="' + escHtml(doc.file) + '">' + escHtml(doc.label) + '</a>';
    });

    html += '</div>';
    container.innerHTML = html;
  }

  // ── Document Viewer ────────────────────────────

  var viewerOverlay = document.getElementById('docviewer-overlay');
  var viewerBody = document.getElementById('docviewer-body');
  var viewerPath = document.getElementById('docviewer-path');
  function openViewer(filePath) {
    // Format path for breadcrumb display
    var parts = filePath.replace(/^\.\//, '').split('/');
    var last = parts.pop();
    var breadcrumb = parts.map(function (p) { return escHtml(p); }).join(' / ');
    if (breadcrumb) breadcrumb += ' / ';
    breadcrumb += '<span>' + escHtml(last) + '</span>';
    viewerPath.innerHTML = breadcrumb;

    viewerBody.innerHTML = '<div class="docviewer-loading">Loading&hellip;</div>';
    viewerOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';

    fetch(filePath)
      .then(function (res) {
        if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
        return res.text();
      })
      .then(function (text) {
        if (filePath.match(/\.csv$/i)) {
          viewerBody.innerHTML = renderCsv(text);
        } else {
          viewerBody.innerHTML = marked.parse(text);
        }
      })
      .catch(function () {
        // fetch blocked (e.g. Chrome on file://) — fall back to direct navigation
        closeViewer();
        window.open(filePath, '_blank');
      });
  }

  function renderCsv(text) {
    var lines = text.trim().split('\n');
    if (lines.length === 0) return '<p>Empty file.</p>';
    var html = '<table><thead><tr>';
    var headers = parseCsvLine(lines[0]);
    headers.forEach(function (h) { html += '<th>' + escHtml(h) + '</th>'; });
    html += '</tr></thead><tbody>';
    for (var i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      var cells = parseCsvLine(lines[i]);
      html += '<tr>';
      cells.forEach(function (c) { html += '<td>' + escHtml(c) + '</td>'; });
      html += '</tr>';
    }
    html += '</tbody></table>';
    return html;
  }

  function parseCsvLine(line) {
    var result = [];
    var current = '';
    var inQuotes = false;
    for (var i = 0; i < line.length; i++) {
      var ch = line[i];
      if (inQuotes) {
        if (ch === '"' && line[i + 1] === '"') {
          current += '"';
          i++;
        } else if (ch === '"') {
          inQuotes = false;
        } else {
          current += ch;
        }
      } else {
        if (ch === '"') {
          inQuotes = true;
        } else if (ch === ',') {
          result.push(current.trim());
          current = '';
        } else {
          current += ch;
        }
      }
    }
    result.push(current.trim());
    return result;
  }

  function closeViewer() {
    viewerOverlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('docviewer-close').addEventListener('click', closeViewer);

  viewerOverlay.addEventListener('click', function (e) {
    if (e.target === viewerOverlay) closeViewer();
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && viewerOverlay.classList.contains('open')) {
      closeViewer();
    }
  });

  // Link interception — intercept .md/.csv clicks, try viewer, fall back on error
  document.querySelector('.dashboard').addEventListener('click', function (e) {
    var link = e.target.closest('a[href]');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!href) return;
    // Only intercept relative links to .md or .csv files
    if (href.match(/^https?:\/\//) || href.match(/^#/)) return;
    if (href.match(/\.(md|csv)$/i)) {
      e.preventDefault();
      openViewer(href);
    }
  });

  // Also intercept drawer footer links (outside .dashboard)
  var drawerFooterEl = document.getElementById('drawer-footer');
  drawerFooterEl.addEventListener('click', function (e) {
    var link = e.target.closest('a[href]');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!href) return;
    if (href.match(/^https?:\/\//) || href.match(/^#/)) return;
    if (href.match(/\.(md|csv)$/i)) {
      e.preventDefault();
      closeDrawer();
      openViewer(href);
    }
  });

  // ── Init ─────────────────────────────────────

  function init() {
    document.title = CFG.project.name + ' — Dashboard';
    renderHeader();
    renderDocTiers();
    renderMilestones();
    renderConcepts();
    renderFooter();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>

</body>
</html>
